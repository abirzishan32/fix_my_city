spring.application.name=fixmycity

# --- Supabase PostgreSQL (Supavisor "session" pooler, port 5432) ---
# NOTE: JDBC URL MUST start with jdbc:postgresql:// and must NOT contain the
# user:password. Credentials go in separate properties below.
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://aws-0-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require
spring.datasource.username=postgres.fbhihdoyqowvlooazrnx
spring.datasource.password=Meow.Meow1234

# HikariCP: keep the pool small — Supabase caps concurrent connections.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# --- JPA / Hibernate ---
spring.jpa.show-sql=true
# 'update' is fine for dev; use 'validate' + Flyway/Liquibase for production.
spring.jpa.hibernate.ddl-auto=update
# Entities are mapped to DTOs inside @Transactional service methods, so we don't
# need (and don't want) an open EntityManager during view rendering.
spring.jpa.open-in-view=false

# --- Server ---
server.address=0.0.0.0
server.compression.enabled=false
# 5s is very tight once image uploads are added; only affects async requests.
spring.mvc.async.request-timeout=30000

# --- Multipart (needed for issue image uploads) ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- JWT (HttpOnly cookie auth) ---
app.jwt.secret=${JWT_SECRET:dev-fixmycity-super-secret-change-me-please-min-32-chars}
app.jwt.expiration-ms=86400000
app.jwt.cookie-name=access_token
# In production (HTTPS + cross-site frontend) set: cookie-secure=true, cookie-same-site=None
app.jwt.cookie-secure=false
app.jwt.cookie-same-site=Lax

# --- Supabase Storage (issue images) ---
# service-role key is REQUIRED for uploads — set SUPABASE_SERVICE_ROLE_KEY in your env.
app.supabase.url=${SUPABASE_URL:https://fbhihdoyqowvlooazrnx.supabase.co}
app.supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
app.supabase.bucket=${SUPABASE_BUCKET:issue-images}

# --- CORS (frontend origin) ---
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
